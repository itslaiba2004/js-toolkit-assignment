<!DOCTYPE html>
<html>
<head>
  <title>JS Toolkit Assignment</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: white;
    }

    h1 {
      color: darkblue;
    }

    button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #box {
      width: 200px;
      height: 100px;
      margin: auto;
      background-color: lightgray;
      line-height: 100px;
    }
  </style>
</head>

<body>

  <h1 id="heading">JS Toolkit Assignment</h1>

  <p id="output">Hello World</p>

  <div id="box">Box</div>

  <button onclick="showMessage()">Show Message</button>
  <button onclick="changeColor()">Change Background</button>
  <button onclick="changeText()">Change Text</button>
  <button onclick="changeBox()">Change Box Color</button>

  <script src="script.js"></script>

</body>
</html>
